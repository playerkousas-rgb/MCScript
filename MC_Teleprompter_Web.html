<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC 提詞器 Pro - 司儀專用</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&amp;display=swap');
        
        body {
            font-family: 'Noto Sans TC', system-ui, sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        .header {
            background-color: #111;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .title {
            font-size: 20px;
            font-weight: 700;
        }
        
        .role-btn {
            background-color: #1a1a1a;
            color: #00d4ff;
            border: 2px solid #00d4ff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .script-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }
        
        .line {
            display: flex;
            align-items: flex-start;
            padding: 14px 20px;
            margin-bottom: 8px;
            border-radius: 12px;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .line.my-role {
            border: 3px solid #00d4ff;
            background-color: rgba(0, 212, 255, 0.12);
        }
        
        .line.current {
            background-color: #ffcc00 !important;
            color: #000 !important;
            font-weight: 700;
            border: none;
        }
        
        .role-tag {
            font-size: 12px;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 6px;
            margin-right: 12px;
            flex-shrink: 0;
            margin-top: 3px;
        }
        
        .line-text {
            flex: 1;
            line-height: 1.5;
            font-size: 22px;
        }
        
        .controls {
            background-color: #111;
            padding: 16px 20px;
            border-top: 1px solid #333;
            flex-shrink: 0;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background-color: #0066ff;
            color: white;
        }
        
        .btn-success {
            background-color: #00aa44;
            color: white;
        }
        
        .btn-danger {
            background-color: #cc0000;
            color: white;
        }
        
        .status {
            text-align: center;
            font-size: 14px;
            color: #888;
            margin-top: 8px;
        }
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px;
        }
        
        .empty-state h2 {
            font-size: 28px;
            margin-bottom: 12px;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
        }
        
        .role-option {
            padding: 14px;
            margin: 8px 0;
            background: #222;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .role-option:hover {
            background: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <div>
                    <div class="title">MC 提詞器 Pro</div>
                    <div id="progress" style="font-size:13px; color:#888;">尚未載入講稿</div>
                </div>
            </div>
            
            <div style="display: flex; align-items: center; gap: 10px;">
                <!-- 角色按鈕 -->
                <button onclick="showRoleModal()" class="role-btn">
                    👤 <span id="current-role">司儀</span>
                </button>
                
                <!-- 匯入按鈕 -->
                <button onclick="importScript()" class="btn btn-primary" style="padding: 8px 16px; font-size: 14px;">
                    📁 匯入講稿
                </button>
            </div>
        </div>

        <!-- Script Area -->
        <div id="script-area" class="script-container">
            <!-- 內容會由 JS 動態產生 -->
            <div class="empty-state" id="empty-state">
                <h2>歡迎使用 MC 提詞器</h2>
                <p style="color:#888; max-width:300px;">請先匯入你的司儀講稿（.txt 檔案）</p>
                <button onclick="importScript()" class="btn btn-primary" style="margin-top: 20px; padding: 14px 40px;">
                    匯入講稿
                </button>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <div style="display: flex; gap: 12px; justify-content: center;">
                <button id="listen-btn" onclick="toggleListening()" class="btn btn-success" style="flex:1; max-width:220px;">
                    🎤 開始語音跟隨
                </button>
                
                <button onclick="resetPosition()" class="btn" style="background:#333; color:white; flex:1; max-width:120px;">
                    重置位置
                </button>
            </div>
            
            <div class="status" id="status-text">準備就緒</div>
        </div>
    </div>

    <!-- 角色選擇彈窗 -->
    <div id="role-modal" class="modal">
        <div class="modal-content">
            <h3 style="text-align:center; margin-bottom:20px;">請選擇你的角色</h3>
            
            <div onclick="selectRole('司儀')" class="role-option">
                <span>司儀</span>
            </div>
            <div onclick="selectRole('會長')" class="role-option">
                <span>會長</span>
            </div>
            <div onclick="selectRole('區總監')" class="role-option">
                <span>區總監</span>
            </div>
            <div onclick="selectRole('地域總監')" class="role-option">
                <span>地域總監</span>
            </div>
            <div onclick="selectRole('區主席')" class="role-option">
                <span>區主席</span>
            </div>
            <div onclick="selectRole('區司庫')" class="role-option">
                <span>區司庫</span>
            </div>
            
            <div style="margin-top:20px; text-align:center;">
                <button onclick="closeRoleModal()" style="background:#444; color:white; padding:10px 30px; border-radius:8px; border:none;">
                    關閉
                </button>
            </div>
        </div>
    </div>

    <script>
        // 全域變數
        let scriptLines = [];
        let currentIndex = 0;
        let isListening = false;
        let recognition = null;
        let myRole = "司儀";
        
        // 更新進度顯示
        function updateProgress() {
            const progressEl = document.getElementById('progress');
            if (scriptLines.length > 0) {
                progressEl.innerHTML = `整體進度：第 ${currentIndex + 1} / ${scriptLines.length} 行`;
            } else {
                progressEl.innerHTML = '尚未載入講稿';
            }
        }
        
        // 匯入講稿
        function importScript() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.txt';
            
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const content = ev.target.result;
                    const lines = content.split('\n')
                        .map(line => line.trim())
                        .filter(line => line.length > 0);
                    
                    if (lines.length > 0) {
                        scriptLines = lines;
                        currentIndex = 0;
                        document.getElementById('empty-state').style.display = 'none';
                        renderScript();
                        updateProgress();
                        document.getElementById('status-text').innerText = '講稿已載入';
                    }
                };
                reader.readAsText(file);
            };
            
            input.click();
        }
        
        // 渲染講稿
        function renderScript() {
            const container = document.getElementById('script-area');
            container.innerHTML = '';
            
            scriptLines.forEach((line, index) => {
                const div = document.createElement('div');
                div.className = 'line';
                
                // 判斷是否為我的角色
                const isMyRole = line.startsWith(myRole);
                if (isMyRole) {
                    div.classList.add('my-role');
                }
                
                // 目前進行到的行
                if (index === currentIndex) {
                    div.classList.add('current');
                }
                
                // 提取角色
                let roleTag = '';
                const roles = ['司儀', '會長', '區總監', '地域總監', '區主席', '區司庫'];
                let role = '';
                
                for (let r of roles) {
                    if (line.startsWith(r)) {
                        role = r;
                        break;
                    }
                }
                
                if (role) {
                    const color = getRoleColor(role);
                    roleTag = `<span class="role-tag" style="background:${color}20; color:${color};">${role}</span>`;
                }
                
                div.innerHTML = `
                    <div style="display:flex; width:100%; align-items:flex-start;">
                        ${roleTag}
                        <div class="line-text">${line}</div>
                    </div>
                `;
                
                // 點擊手動跳轉
                div.onclick = () => {
                    if (!isListening) {
                        currentIndex = index;
                        renderScript();
                        updateProgress();
                    }
                };
                
                container.appendChild(div);
            });
            
            // 自動捲動到目前位置
            setTimeout(() => {
                const currentLine = container.querySelector('.current');
                if (currentLine) {
                    currentLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 100);
        }
        
        function getRoleColor(role) {
            const colors = {
                '司儀': '#00d4ff',
                '會長': '#ff9500',
                '區總監': '#30d158',
                '地域總監': '#af52de',
                '區主席': '#ff2d55',
                '區司庫': '#ffcc00'
            };
            return colors[role] || '#ffffff';
        }
        
        // 選擇角色
        function selectRole(role) {
            myRole = role;
            document.getElementById('current-role').innerText = role;
            closeRoleModal();
            
            if (scriptLines.length > 0) {
                renderScript();
            }
        }
        
        function showRoleModal() {
            document.getElementById('role-modal').style.display = 'flex';
        }
        
        function closeRoleModal() {
            document.getElementById('role-modal').style.display = 'none';
        }
        
        // 語音辨識
        function toggleListening() {
            if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
                alert('你的瀏覽器不支援語音辨識，請使用 Safari 或 Chrome');
                return;
            }
            
            if (isListening) {
                stopListening();
            } else {
                startListening();
            }
        }
        
        function startListening() {
            if (scriptLines.length === 0) {
                alert('請先匯入講稿');
                return;
            }
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            
            recognition.lang = 'zh-HK';           // 香港中文
            recognition.continuous = true;
            recognition.interimResults = true;
            
            recognition.onresult = function(event) {
                let finalTranscript = '';
                
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    }
                }
                
                if (finalTranscript.trim() !== '') {
                    processRecognizedText(finalTranscript);
                }
            };
            
            recognition.onerror = function(event) {
                console.error('語音辨識錯誤:', event);
                stopListening();
            };
            
            recognition.onend = function() {
                if (isListening) {
                    // 自動重新開始（持續聆聽）
                    recognition.start();
                }
            };
            
            try {
                recognition.start();
                isListening = true;
                document.getElementById('listen-btn').innerHTML = '⏹ 停止聆聽';
                document.getElementById('listen-btn').classList.remove('btn-success');
                document.getElementById('listen-btn').classList.add('btn-danger');
                document.getElementById('status-text').innerText = '正在聆聽...';
            } catch(e) {
                alert('無法啟動語音辨識');
            }
        }
        
        function stopListening() {
            if (recognition) {
                recognition.stop();
            }
            isListening = false;
            document.getElementById('listen-btn').innerHTML = '🎤 開始語音跟隨';
            document.getElementById('listen-btn').classList.remove('btn-danger');
            document.getElementById('listen-btn').classList.add('btn-success');
            document.getElementById('status-text').innerText = '已停止';
        }
        
        // 處理辨識文字
        function processRecognizedText(text) {
            if (!isListening || scriptLines.length === 0) return;
            
            const normalized = normalizeText(text);
            
            // 關鍵字觸發
            const keywords = ['動議', '和議', '有無人反對', '宣佈通過', '請一位動議', '多謝', '現在恭請', '確認通過'];
            
            for (let keyword of keywords) {
                if (normalized.includes(normalizeText(keyword))) {
                    advancePosition();
                    return;
                }
            }
            
            // 模糊比對
            let bestScore = 0;
            let bestIndex = currentIndex;
            
            const searchEnd = Math.min(currentIndex + 8, scriptLines.length);
            
            for (let i = currentIndex; i < searchEnd; i++) {
                const score = calculateSimilarity(normalized, normalizeText(scriptLines[i]));
                if (score > bestScore && score > 0.55) {
                    bestScore = score;
                    bestIndex = i;
                }
            }
            
            if (bestScore > 0.55 && bestIndex !== currentIndex) {
                currentIndex = bestIndex;
                renderScript();
                updateProgress();
            }
        }
        
        function normalizeText(text) {
            return text.toLowerCase().replace(/[\p{P}\p{S}]/gu, '').trim();
        }
        
        function calculateSimilarity(str1, str2) {
            if (str2.includes(str1) || str1.includes(str2)) return 0.9;
            
            const words1 = new Set(str1.split(/\s+/));
            const words2 = new Set(str2.split(/\s+/));
            
            let intersection = 0;
            words1.forEach(word => {
                if (words2.has(word)) intersection++;
            });
            
            const union = words1.size + words2.size - intersection;
            return union > 0 ? intersection / union : 0;
        }
        
        function advancePosition() {
            if (currentIndex < scriptLines.length - 1) {
                currentIndex += 2;
                if (currentIndex >= scriptLines.length) currentIndex = scriptLines.length - 1;
                renderScript();
                updateProgress();
            }
        }
        
        // 重置位置
        function resetPosition() {
            currentIndex = 0;
            renderScript();
            updateProgress();
        }
        
        // 初始化
        function init() {
            // 預設角色
            document.getElementById('current-role').innerText = myRole;
            
            // 提示用戶
            console.log('%c[MC提詞器] 網頁版已載入', 'color:#666');
        }
        
        // 啟動
        window.onload = init;
        
        // 鍵盤支援（方便測試）
        document.addEventListener('keydown', function(e) {
            if (e.key === ' ' && scriptLines.length > 0) {
                e.preventDefault();
                if (!isListening) {
                    toggleListening();
                }
            }
        });
    </script>
</body>
</html>
